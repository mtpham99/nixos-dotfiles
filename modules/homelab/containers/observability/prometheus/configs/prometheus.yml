global:
  scrape_interval: "15s"
  evaluation_interval: "15s"

rule_files:
  # - "first.rules"
  # - "second.rules"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
  - job_name: "cadvisor"
    static_configs:
      - targets:
        - "cadvisor.lan:8080"
  - job_name: "jellyfin"
    static_configs:
      - targets:
        - "jellyfin.lan:8096"

